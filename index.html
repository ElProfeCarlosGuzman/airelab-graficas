<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AIRELAB IA PRO</title>
<script src="https://script.google.com/macros/s/AKfycbxb6Tn1TKUvhSNN_j2FNctd8_7RGiPEtK3_SOn2YsPgWEgC2tgz2gfDrgGTsTdJQeVT/exec"></script>

<style>
body{
  font-family:Arial;
  text-align:center;
}

h1{
  margin-top:20px;
}

#alerta{
  font-size:24px;
  font-weight:bold;
  margin:20px;
}

#co2{
  height:400px;
  width:90%;
  margin:auto;
}
</style>
</head>

<body>

<h1>🌎 AIRELAB IA PRO 🌎</h1>

<div id="alerta"></div>

<div id="co2"></div>

<script>

const url = "https://script.google.com/macros/s/AKfycbxb6Tn1TKUvhSNN_j2FNctd8_7RGiPEtK3_SOn2YsPgWEgC2tgz2gfDrgGTsTdJQeVT/exec";

async function cargar(){

  const r = await fetch(url);
  const data = await r.json();

  let co2=[], pred=[], estados=[];

  data.forEach(d=>{
    let t = new Date(d.fecha).getTime();

    co2.push([t, Number(d.co2)]);
    pred.push([t, Number(d.co2_predicho)]);
    estados.push(d.estado);
  });

  let estado = estados[estados.length-1];

  let alerta = document.getElementById("alerta");

  if(estado=="PELIGRO"){
    alerta.innerHTML="🚨 AIRE PELIGROSO - VENTILAR YA";
    alerta.style.color="red";
  }
  else if(estado=="PRECAUCION"){
    alerta.innerHTML="⚠️ PRECAUCIÓN - AIRE EMPEORANDO";
    alerta.style.color="orange";
  }
  else{
    alerta.innerHTML="🟢 AIRE ÓPTIMO";
    alerta.style.color="green";
  }

  Highcharts.chart('co2', {
    chart:{type:'spline'},
    title:{text:'CO₂ Inteligente'},
    xAxis:{type:'datetime'},
    yAxis:{title:{text:'ppm'}},
    series:[
      {name:'CO₂ real', data:co2, color:'#ff4d4d'},
      {name:'Predicción', data:pred, dashStyle:'Dash', color:'#000'}
    ]
  });

}

cargar();
setInterval(cargar,5000);

</script>

</body>
</html>
