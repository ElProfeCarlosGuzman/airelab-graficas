<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AIRELAB Estación Ambiental Escolar</title>
<script src="https://code.highcharts.com/highcharts.js"></script>

<style>
body{
  font-family:Arial;
  background:#ffffff;
  color:#000;
  text-align:center;
}
h1{
  margin-top:20px;
}
#alerta{
  font-size:24px; /* título más pequeño */
  font-weight:bold;
  margin:20px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
  width:90%;
  margin:auto;
}
.chart{
  height:300px; /* para que entren sin scroll */
  background:#ffffff;
  border-radius:10px;
  padding:10px;
}
</style>
</head>
<body>

<h1>🌎 AIRELAB Estación Ambiental Escolar 🌎</h1>

<!-- ALERTA DE TEMPERATURA -->
<div id="alerta">Cargando temperatura...</div>

<div class="grid">
  <div id="tempChart" class="chart"></div>
  <div id="humChart" class="chart"></div>
  <div id="mqChart" class="chart"></div>
  <div id="co2Chart" class="chart"></div>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxb6Tn1TKUvhSNN_j2FNctd8_7RGiPEtK3_SOn2YsPgWEgC2tgz2gfDrgGTsTdJQeVT/exec";

async function cargarDatos(){
  const response = await fetch(url);
  const data = await response.json();

  let temp=[], hum=[], mq=[], co2=[];

  data.forEach(d=>{
    let t = new Date(d.fecha).getTime();
    temp.push([t, Number(d.temperatura)]);
    hum.push([t, Number(d.humedad)]);
    mq.push([t, Number(d.calidad_aire)]);
    co2.push([t, Number(d.co2)]);
  });

  // --- ALERTA DE TEMPERATURA ---
  const ultimoTemp = temp[temp.length-1][1];
  const alerta = document.getElementById("alerta");

  if(ultimoTemp < 20){
    alerta.innerHTML = "❄️ Temperatura BAJA ❄️";
    alerta.style.color = "blue";
  } else if(ultimoTemp > 30){
    alerta.innerHTML = "🔥 Temperatura ALTA 🔥";
    alerta.style.color = "red";
  } else{
    alerta.innerHTML = "🟢 Temperatura NORMAL 🟢";
    alerta.style.color = "green";
  }

  Highcharts.setOptions({time: {timezoneOffset: 5*60}});

  // --- TEMPERATURA ---
  let estadoTemp = ultimoTemp < 20 ? "Baja" : (ultimoTemp > 30 ? "Alta" : "Normal");
  Highcharts.chart('tempChart', {
    chart:{type:'spline', backgroundColor:'#ffffff'},
    title:{text:'Temperatura del Aula'},
    subtitle:{text:'Estado: '+estadoTemp, align:'right', verticalAlign:'middle',
              style:{fontWeight:'bold', color:'#ff4d4d'}},
    xAxis:{type:'datetime'},
    yAxis:{title:{text:'°C'}, min:0, max:50},
    series:[{name:'Temperatura', data:temp, color:'#ff4d4d'}]
  });

  // --- HUMEDAD ---
  let ultimoHum = hum[hum.length-1][1];
  let estadoHum = ultimoHum < 30 ? 'Baja' : (ultimoHum <= 60 ? 'Normal' : 'Alta');
  Highcharts.chart('humChart', {
    chart:{type:'spline', backgroundColor:'#ffffff'},
    title:{text:'Humedad Relativa'},
    subtitle:{text:'Estado: '+estadoHum, align:'right', verticalAlign:'middle',
              style:{fontWeight:'bold', color:'#4da6ff'}},
    xAxis:{type:'datetime'},
    yAxis:{title:{text:'%'}, min:0, max:100},
    series:[{name:'Humedad', data:hum, color:'#4da6ff'}]
  });

  // --- CALIDAD DEL AIRE ---
  let ultimoMQ = mq[mq.length-1][1];
  let estadoMQ = ultimoMQ < 50 ? 'Mala' : (ultimoMQ <= 75 ? 'Moderada' : 'Buena');
  Highcharts.chart('mqChart', {
    chart:{type:'spline', backgroundColor:'#ffffff'},
    title:{text:'Calidad del Aire (%)'},
    subtitle:{text:'Estado: '+estadoMQ, align:'right', verticalAlign:'middle',
              style:{fontWeight:'bold', color:'#009900'}},
    xAxis:{type:'datetime'},
    yAxis:{title:{text:'%'}, min:0, max:120},
    series:[{name:'Calidad Aire', data:mq, color:'#009900'}]
  });

  // --- CO2 ---
  let ultimoCO2 = co2[co2.length-1][1];
  let estadoCO2 = ultimoCO2 < 800 ? 'Bueno' : (ultimoCO2 <= 1200 ? 'Moderado' : 'Alto');
  Highcharts.chart('co2Chart', {
    chart:{type:'spline', backgroundColor:'#ffffff'},
    title:{text:'CO₂ estimado (ppm)'},
    subtitle:{text:'Estado: '+estadoCO2, align:'right', verticalAlign:'middle',
              style:{fontWeight:'bold', color:'#ff4d4d'}},
    xAxis:{type:'datetime'},
    yAxis:{title:{text:'ppm'}, min:400, max:2000},
    series:[{name:'CO₂', data:co2, color:'#ff4d4d'}]
  });

}

cargarDatos();
setInterval(cargarDatos,6000);
</script>

</body>
</html>
