<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AIRELAB Estación Ambiental Escolar</title>
<script src="https://code.highcharts.com/highcharts.js"></script>

<style>
body{
  font-family:Arial;
  background:#ffffff;
  color:#000;
  text-align:center;
  margin:0;
  padding:0;
}
h1{
  margin-top:20px;
}
#alerta{
  font-size:24px; /* tamaño más pequeño */
  font-weight:bold;
  margin:10px 0;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-auto-rows:1fr;
  gap:15px;
  width:95%;
  margin:auto;
}
.chart{
  height:250px; /* ajustado para entrar en pantalla */
  background:#ffffff;
  border-radius:10px;
  padding:5px;
}
</style>
</head>
<body>

<h1>🌎 AIRELAB Estación Ambiental Escolar 🌎</h1>

<!-- ALERTA DE TEMPERATURA -->
<div id="alerta">Cargando temperatura...</div>

<div class="grid">
  <div id="tempChart" class="chart"></div>
  <div id="humChart" class="chart"></div>
  <div id="mqChart" class="chart"></div>
  <div id="co2Chart" class="chart"></div>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxb6Tn1TKUvhSNN_j2FNctd8_7RGiPEtK3_SOn2YsPgWEgC2tgz2gfDrgGTsTdJQeVT/exec";

async function cargarDatos(){
  const response = await fetch(url);
  const data = await response.json();

  let temp=[], hum=[], mq=[], co2=[];

  data.forEach(d=>{
    let t = new Date(d.fecha).getTime();
    temp.push([t, Number(d.temperatura)]);
    hum.push([t, Number(d.humedad)]);
    mq.push([t, Number(d.calidad_aire)]);
    co2.push([t, Number(d.co2)]);
  });

  // --- ALERTA DE TEMPERATURA ---
  const ultimoTemp = temp[temp.length-1][1];
  const alerta = document.getElementById("alerta");

  if(ultimoTemp < 20){
    alerta.innerHTML = "❄️ Temperatura BAJA ❄️";
    alerta.style.color = "blue";
  } else if(ultimoTemp > 30){
    alerta.innerHTML = "🔥 Temperatura ALTA 🔥";
    alerta.style.color = "red";
  } else{
    alerta.innerHTML = "🟢 Temperatura NORMAL 🟢";
    alerta.style.color = "green";
  }

  Highcharts.setOptions({time:{timezoneOffset:5*60}});

  // --- TEMPERATURA ---
  Highcharts.chart('tempChart', {
    chart:{type:'spline', backgroundColor:'#ffffff'},
    title:{text:'Temperatura del Aula'},
    subtitle:{text:'Último valor: '+ultimoTemp+' °C', align:'right', verticalAlign:'middle',
              style:{fontWeight:'bold', color:'#ff4d4d'}},
    xAxis:{type:'datetime'},
    yAxis:{
      title:{text:'°C'},
      min:0,
      max:50,
      plotBands:[
        {from:0, to:20, color:'rgba(0,0,255,0.1)', label:{text:'Baja', style:{color:'#00f'}}},
        {from:20, to:30, color:'rgba(0,255,0,0.1)', label:{text:'Normal', style:{color:'#090'}}},
        {from:30, to:50, color:'rgba(255,0,0,0.1)', label:{text:'Alta', style:{color:'#900'}}}
      ]
    },
    series:[{name:'Temperatura', data:temp, color:'#ff4d4d'}]
  });

  // --- HUMEDAD ---
  const ultimoHum = hum[hum.length-1][1];
  Highcharts.chart('humChart', {
    chart:{type:'spline', backgroundColor:'#ffffff'},
    title:{text:'Humedad Relativa'},
    subtitle:{text:'Último valor: '+ultimoHum+' %', align:'right', verticalAlign:'middle',
              style:{fontWeight:'bold', color:'#4da6ff'}},
    xAxis:{type:'datetime'},
    yAxis:{
      title:{text:'%'},
      min:0,
      max:100,
      plotBands:[
        {from:0, to:30, color:'rgba(0,0,255,0.1)', label:{text:'Baja', style:{color:'#00f'}}},
        {from:30, to:60, color:'rgba(0,255,0,0.1)', label:{text:'Normal', style:{color:'#090'}}},
        {from:60, to:100, color:'rgba(255,0,0,0.1)', label:{text:'Alta', style:{color:'#900'}}}
      ]
    },
    series:[{name:'Humedad', data:hum, color:'#4da6ff'}]
  });

  // --- CALIDAD DEL AIRE ---
  const ultimoMQ = mq[mq.length-1][1];
  Highcharts.chart('mqChart', {
    chart:{type:'spline', backgroundColor:'#ffffff'},
    title:{text:'Calidad del Aire (%)'},
    subtitle:{text:'Último valor: '+ultimoMQ+' %', align:'right', verticalAlign:'middle',
              style:{fontWeight:'bold', color:'#009900'}},
    xAxis:{type:'datetime'},
    yAxis:{
      title:{text:'%'},
      min:0,
      max:120,
      plotBands:[
        {from:0, to:50, color:'rgba(255,0,0,0.1)', label:{text:'Mala', style:{color:'#900'}}},
        {from:50, to:75, color:'rgba(255,165,0,0.1)', label:{text:'Moderada', style:{color:'#a60'}}},
        {from:75, to:120, color:'rgba(0,255,0,0.1)', label:{text:'Buena', style:{color:'#090'}}}
      ]
    },
    series:[{name:'Calidad Aire', data:mq, color:'#009900'}]
  });

  // --- CO2 ---
  const ultimoCO2 = co2[co2.length-1][1];
  Highcharts.chart('co2Chart', {
    chart:{type:'spline', backgroundColor:'#ffffff'},
    title:{text:'CO₂ estimado (ppm)'},
    subtitle:{text:'Último valor: '+ultimoCO2+' ppm', align:'right', verticalAlign:'middle',
              style:{fontWeight:'bold', color:'#ff4d4d'}},
    xAxis:{type:'datetime'},
    yAxis:{
      title:{text:'ppm'},
      min:400,
      max:2000,
      plotBands:[
        {from:0, to:800, color:'rgba(0,255,0,0.1)', label:{text:'Bueno', style:{color:'#090'}}},
        {from:800, to:1200, color:'rgba(255,165,0,0.1)', label:{text:'Moderado', style:{color:'#a60'}}},
        {from:1200, to:2000, color:'rgba(255,0,0,0.1)', label:{text:'Alto', style:{color:'#900'}}}
      ]
    },
    series:[{name:'CO₂', data:co2, color:'#ff4d4d'}]
  });

}

cargarDatos();
setInterval(cargarDatos,6000);
</script>

</body>
</html>
